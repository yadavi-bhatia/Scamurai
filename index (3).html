    const g=ctx.createLinearGradient(0,0,W,0);
    g.addColorStop(0,'rgba(255,59,92,0.2)');g.addColorStop(0.5,'rgba(255,107,53,0.6)');g.addColorStop(1,'rgba(255,59,92,0.9)');
    ctx.beginPath();ctx.moveTo(0,H);pts.forEach(p=>ctx.lineTo(p.x,p.y));ctx.lineTo(W,H);ctx.closePath();
    const fg=ctx.createLinearGradient(0,0,0,H);fg.addColorStop(0,'rgba(255,59,92,0.16)');fg.addColorStop(1,'rgba(255,59,92,0)');
    ctx.fillStyle=fg;ctx.fill();
    ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
    for(let i=1;i<pts.length;i++){const mx=(pts[i-1].x+pts[i].x)/2,my=(pts[i-1].y+pts[i].y)/2;ctx.quadraticCurveTo(pts[i-1].x,pts[i-1].y,mx,my);}
    ctx.strokeStyle=g;ctx.lineWidth=2.5;ctx.stroke();
    if(isPlaying&&playPos>0){
      const px=(playPos/PLAY_DUR)*W;
      ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(px,0);ctx.lineTo(px,H);ctx.stroke();
      const ni=Math.min(Math.floor((playPos/PLAY_DUR)*(N-1)),N-1);
      ctx.beginPath();ctx.arc(px,pts[ni].y,4,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
    }
    raf.current=requestAnimationFrame(draw);
  },[scenario,isPlaying,playPos]);
  useEffect(()=>{raf.current=requestAnimationFrame(draw);return()=>cancelAnimationFrame(raf.current);},[draw]);
  return <canvas ref={ref} style={{width:'100%',height:'100%',display:'block'}}/>;
}

      </div>

        SCORE {currentScore} → <span style={{color:getRiskColor(currentScore),fontWeight:700}}>{getRiskLbl(currentScore)}</span>
      </div>
    </div>
  );
}

      const np=parseFloat((p+0.1).toFixed(1));
      if(np>=PLAY_DUR){setIsPlaying(false);clearInterval(callRef.current);return PLAY_DUR;}
      scen.transcript.forEach(line=>{const[m,s]=line.t.split(':').map(Number);if(Math.abs(np-(m*60+s))<0.12) setTranscript(t=>[...t,line]);});
      playRef.current=setTimeout(run,100);return np;
    });
    playRef.current=setTimeout(run,100);return()=>clearTimeout(playRef.current);
  },[isPlaying,scen]);

  const blacklistNumber=async()=>{
    const num=scen.number;
    if(blacklist.find(b=>b.num===num)){setBlBtn({text:'✓ ALREADY BLACKLISTED',cls:'btn-ghost'});return;}
    const m={0:'bl-ai',1:'bl-human',2:'bl-deep'},l={0:'AI',1:'HUMAN',2:'DEEPFAKE'};
    setBlacklist(b=>[...b,{num,type:l[scenIdx],cls:m[scenIdx]}]);
    setBlBtn({text:`✓ ${num} BLACKLISTED`,cls:'btn-success'});
    toast(`🚫 ${num} blacklisted`);
    try{await fetch(`${BACKEND}/exotel/webhook`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'blacklist',number:num}),signal:AbortSignal.timeout(2000)});}catch{}
  };

  const exportReport=()=>{
    const s=scen,r={call_id:'call_'+Date.now(),timestamp:new Date().toISOString(),caller_number:s.number,caller_type:s.callerType,scam_score:s.scamScore,risk_level:s.riskLevel,deepfake_risk:s.deepfake,voice_match:s.voiceMatch,signals:Object.fromEntries(s.signalLabels.map((l,i)=>[l,s.signals[i]])),transcript:s.transcript.map(t=>t.text).join(' | ')};
    const b=new Blob([JSON.stringify(r,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`scamurai_incident_${s.number.replace(/\D/g,'')}.json`;a.click();
    toast('📤 Incident report exported');
  };

  const sendAlert=async()=>{
    try{await fetch(`${BACKEND}/exotel/webhook`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'alert',number:scen.number,score:scen.scamScore}),signal:AbortSignal.timeout(2000)});}catch{}
    setNotifSent(true);setAlertSent(true);
    toast(`🚨 Alert sent to ${contacts.filter(c=>c.notify).length} contacts`);
    setTimeout(()=>{setShowNotif(false);setNotifSent(false);},2500);
  };

  const pct=(playPos/PLAY_DUR)*100,pm=Math.floor(playPos/60),ps=Math.floor(playPos%60),cm=Math.floor(callSecs/60),cs=callSecs%60;

  const NAV={DETECTION:['Live Monitor','Call History','Voice Analysis'],PROTECTION:['Blacklist Registry','Trusted Contacts','Alert Config'],INTEL:['Threat Patterns','AI Training Data','Incident Export']};

  const renderPage=()=>{
    if(page==='Call History') return <CallHistoryPage history={history} blacklist={blacklist} onBlacklist={(num,type)=>{const m={AI:'bl-ai',HUMAN:'bl-human',DEEPFAKE:'bl-deep',SAFE:'bl-human'};if(!blacklist.find(b=>b.num===num)){setBlacklist(b=>[...b,{num,type,cls:m[type]||'bl-human'}]);toast(`🚫 ${num} blacklisted`);}}}/>;
    if(page==='Voice Analysis') return <VoiceAnalysisPage/>;
    if(page==='Blacklist Registry') return <BlacklistPage blacklist={blacklist} onRemove={num=>{setBlacklist(b=>b.filter(x=>x.num!==num));toast('✓ Number removed');}} onAdd={e=>{if(!blacklist.find(b=>b.num===e.num)){setBlacklist(b=>[...b,e]);toast(`🚫 ${e.num} blacklisted`);}}}/>;
    if(page==='Trusted Contacts') return <TrustedContactsPage contacts={contacts} onToggle={i=>setContacts(c=>c.map((x,j)=>j===i?{...x,notify:!x.notify}:x))} onAdd={c=>{setContacts(x=>[...x,c]);toast(`✓ ${c.name} added`);}} onRemove={i=>{setContacts(c=>c.filter((_,j)=>j!==i));toast('Contact removed');}}/>;
    if(page==='Alert Config') return <AlertConfigPage thresholds={thresholds} onChange={(k,v)=>setThresholds(t=>({...t,[k]:v}))} toggles={alertToggles} onToggle={k=>setAlertToggles(t=>({...t,[k]:!t[k]}))}/>;
    if(page==='Threat Patterns') return <ThreatPatternsPage/>;
    if(page==='AI Training Data') return <TrainingDataPage/>;
    if(page==='Incident Export') return <IncidentExportPage history={history} blacklist={blacklist} toast={toast}/>;
    return null;
  };

  return(
    <div className="dash">
      {/* SIDEBAR */}
      <aside className="sidebar">
        <div className="logo">
          <div className="logo-icon">⚔</div>
          <div><div className="logo-text">SCAMURAI</div><div className="logo-sub">THREAT INTEL v2.1</div></div>
        </div>
        {Object.entries(NAV).map(([sec,items])=><React.Fragment key={sec}>
          <div className="nav-section">{sec}</div>
          {items.map(item=><div key={item} className={`nav-item${page===item?' active':''}`} onClick={()=>setPage(item)}><span className="nav-dot"/>{item}</div>)}
        </React.Fragment>)}
        <div className="bl-count-box">
          <div style={{fontSize:10,color:'var(--text3)',fontFamily:'Share Tech Mono,monospace',letterSpacing:'1.5px',marginBottom:4}}>BLACKLISTED NUMBERS</div>
          <div style={{fontSize:28,fontWeight:800,color:'var(--red)'}}>{blacklist.length}</div>
          <div style={{fontSize:11,color:'var(--text2)',marginTop:2}}>numbers blocked this session</div>
        </div>
      </aside>

      {/* CENTER */}
      <div className="center-col">
        <header className="topbar">
          <div className="sys-status"><div className={`sdot${alertSent?' red':''}`}/><span className="mono" style={{fontSize:12}}>{alertSent?'🚨 EMERGENCY ALERT SENT':'SYSTEM ARMED — EXOTEL CONNECTED'}</span></div>
          <div className="exotel-badge">📞 EXOTEL LIVE</div>
          <div className="clock">{clock}</div>
        </header>

        {page==='Live Monitor'?(<>
          <main className="main">
            <div className="scen-strip">
              {SCENARIOS.map((s,i)=><div key={s.id} className={`sc${scenIdx===i?' s'+i:''}`} onClick={()=>selectScenario(i)}>
                <div className={`sc-badge ${i===0?'b-ai':i===1?'b-hu':'b-dp'}`}>{i===0?'AI SCAMMER':i===1?'HUMAN':'DEEPFAKE'}</div>
                <div style={{fontSize:20,marginBottom:4}}>{i===0?'🤖':i===1?'👤':'👥'}</div>
                <div style={{fontSize:13,fontWeight:700,marginBottom:2}}>{i===0?'AI Scammer Call':i===1?'Human Scammer Call':'Deepfake Family'}</div>
                <div style={{fontSize:10,color:'var(--text3)',fontFamily:'Share Tech Mono,monospace',letterSpacing:1}}>{i===0?'BANK IMPERSONATION':i===1?'OTP / UPI FRAUD':'VOICE CLONE ATTACK'}</div>
              </div>)}
            </div>
            <div className="metrics-row">
              <div className="metric"><div className="lbl">SCAM SCORE</div><div className={`val mono ${getScamCls(scen.scamScore)}`}>{scen.scamScore}</div><div className="ch" style={{color:scen.scamScore>=thresholds.dangerous?'var(--red)':'var(--yellow)'}}>▲ {getRiskLbl(scen.scamScore)}</div></div>
              <div className="metric"><div className="lbl">VOICE MATCH</div><div className="val warn mono">{scen.voiceMatch}</div><div className="ch" style={{color:'var(--text3)'}}>AI-LIKELY CALLER</div></div>
              <div className="metric"><div className="lbl">DEEPFAKE RISK</div><div className={`val mono ${scen.deepfake>=70?'danger':'warn'}`}>{scen.deepfake}%</div><div className="ch" style={{color:scen.deepfake>=70?'var(--red)':'var(--yellow)'}}>{scen.deepfake>=70?'HIGH SYNTHETIC':'MEDIUM RISK'}</div></div>
              <div className="metric"><div className="lbl">CALL DURATION</div><div className="val info mono">{cm}:{String(cs).padStart(2,'0')}</div><div className="ch" style={{color:'var(--text3)'}}>{scen.callerType}</div></div>
            </div>
            <div className="wave-panel">
              <div className="ph">
                <div className="pt">LIVE THREAT WAVEFORM <span className="mono" style={{fontSize:10,color:'var(--text3)'}}>— RISK OVER TIME</span></div>
                <div className={`risk-tag ${playPos>=PLAY_DUR?'risk-low':getRiskCls(scen.scamScore)}`}>{playPos>=PLAY_DUR?'CALL ENDED':scen.riskLevel}</div>
              </div>
              <div className="chart-area"><WaveCanvas scenario={scen} isPlaying={isPlaying} playPos={playPos}/></div>
              <div className="play-bar">
                <button className={`pbtn${isPlaying?' playing':''}`} onClick={togglePlay}>{playPos>=PLAY_DUR?'↺':isPlaying?'⏸':'▶'}</button>
                <div className="prog-wrap" onClick={e=>{const r=e.currentTarget.getBoundingClientRect();setPlayPos(((e.clientX-r.left)/r.width)*PLAY_DUR);}}>
                  <div className="prog-fill" style={{width:`${pct}%`}}/>
                  <div className="prog-dot" style={{left:`calc(${pct}% - 5px)`}}/>
                </div>
                <span className="mono" style={{fontSize:11,color:'var(--text2)',flexShrink:0}}>{pm}:{String(ps).padStart(2,'0')} / 0:30</span>
                <span className="mono" style={{fontSize:11,color:'var(--cyan)',flexShrink:0,marginLeft:8}}>{scen.number}</span>
              </div>
            </div>
            <div className="sig-row">
              {scen.signalLabels.map((lbl,i)=><div className="sig-card" key={lbl}>
                <div className="sig-name">{lbl}</div>
                <div className="sig-pct" style={{color:scen.sigColors[i]}}>{scen.signals[i]}%</div>
                <div className="sig-bar-w"><div className="sig-bar" style={{width:`${scen.signals[i]}%`,background:scen.sigColors[i]}}/></div>
              </div>)}
            </div>
          </main>
          <footer className="footer">
            {[['var(--green)','PIPELINE: ACTIVE'],['var(--cyan)','EXOTEL: CONNECTED'],['var(--yellow)','MFCC ENGINE: ARMED'],['var(--purple)','DEEPFAKE DETECTOR: ON']].map(([c,l])=><div key={l} style={{display:'flex',alignItems:'center',gap:6}}><div className="fdot" style={{background:c}}/>{l}</div>)}
            <div style={{marginLeft:'auto'}}>SCAMURAI v2.1 — HACKATHON BUILD 2026</div>
          </footer>
        </>):(<main className="main">{renderPage()}</main>)}
      </div>

      {/* RIGHT PANEL */}
      <aside className="right-panel">
        <div className="rp-sec">
          <div className="rp-ttl">THREAT GAUGE</div>
          <div className="gauge-wrap">
            <GaugeCanvas score={scen.scamScore} color={scen.gaugeColor}/>
            <div className="gauge-lbl" style={{color:scen.gaugeColor}}>{scen.scamScore}</div>
            <div className="gauge-sub">{getRiskLbl(scen.scamScore)}</div>
          </div>
        </div>

        {/* ★ THRESHOLD GAUGE — MAIN FEATURE ★ */}
        <div className="rp-sec">
          <div className="rp-ttl">⚙ DETECTION THRESHOLDS</div>
          <ThresholdGauge thresholds={thresholds} onChange={(k,v)=>setThresholds(t=>({...t,[k]:v}))} currentScore={scen.scamScore}/>
        </div>

        <div className="rp-sec">
          <div className="rp-ttl">LIVE TRANSCRIPT</div>
          <div className="t-area">
            {transcript.map((line,i)=><div key={i} className={`t-line${line.flag?' flag':''}`}>
              <span className={`t-who mono ${line.who==='system'?'t-sys':'t-caller'}`}>{line.who==='system'?'SYS':'CALLER'}</span>
              <span className="t-txt">{line.text}</span>
              <span className="t-tm">{line.t}</span>
            </div>)}
          </div>
        </div>

        <div className="rp-sec">
          <div className="rp-ttl">ACTIVE ALERTS</div>
          {scen.alerts.map((a,i)=><div key={i} className={`alert-item ${a.cls}`}>
            <span style={{fontSize:13,flexShrink:0}}>{a.icon}</span>
            <div style={{flex:1,lineHeight:1.4,fontSize:11}}>{a.text}</div>
            <span style={{fontSize:10,color:'var(--text3)',fontFamily:'Share Tech Mono,monospace'}}>{a.t}</span>
          </div>)}
        </div>

        <div className="rp-sec">
          <div className="rp-ttl">ACTIONS</div>
          <div className="act-btns">
            <button className="btn btn-danger" onClick={()=>{setShowNotif(true);setNotifSent(false);}}>🚨 ALERT TRUSTED CONTACTS</button>
            <button className={`btn ${blBtn.cls}`} onClick={blacklistNumber}>{blBtn.text}</button>
            <button className="btn btn-ghost" onClick={exportReport}>📤 EXPORT INCIDENT REPORT</button>
          </div>
        </div>

        <div className="rp-sec">
          <div className="rp-ttl">BLACKLIST PREVIEW</div>
          <div className="bl-preview">
            {blacklist.map((b,i)=><div key={i} className="bl-entry">
              <span className="bl-phone">{b.num}</span>
              <span className={`bl-tag ${b.cls}`}>{b.type}</span>
            </div>)}
          </div>
        </div>
      </aside>

      {/* ALERT MODAL */}
      <div className={`overlay${showNotif?' show':''}`}>
        <div className="modal">
          <div className="m-icon">🛡</div>
          <div className="m-title">SEND EMERGENCY ALERT</div>
          <div className="m-msg">
            Scam call from <strong>{scen.number}</strong><br/>
            Score: <strong style={{color:'var(--red)'}}>{scen.scamScore} — {scen.riskLevel}</strong><br/>
            Notifying <strong>{contacts.filter(c=>c.notify).length}</strong> trusted contacts.
          </div>
          {!notifSent?(<div className="m-actions">
            <button className="m-confirm" onClick={sendAlert}>SEND NOW</button>
            <button className="m-cancel" onClick={()=>setShowNotif(false)}>CANCEL</button>
          </div>):(
            <div className="m-sent">✓ ALERT SENT TO {contacts.filter(c=>c.notify).length} CONTACTS</div>
          )}
        </div>
      </div>

      <div className={`toast${toastShow?' show':''}`}>{toastMsg}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
